name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run linting
      continue-on-error: true
      run: |
        ruff check core/ tui/ --select E,F,W --ignore E501 || true
        black --check core/ tui/ --diff || true

    - name: Run tests
      run: pytest tests/ -v --tb=short -x

    - name: Run tests with coverage
      if: matrix.python-version == '3.12'
      run: |
        pytest tests/ --cov=core --cov=tui --cov-report=term-missing --cov-report=xml

    - name: Upload coverage
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  # Docker build test
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t grassflow .

    - name: Test Docker image
      run: docker run --rm grassflow --help
